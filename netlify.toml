[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Legacy slug redirects → hybrid roadmap phases
[[redirects]]
  from = "/roadmap/ai-engineering-foundations"
  to = "/roadmap/transformer-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/ai-engineering-foundations/*"
  to = "/roadmap/transformer-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/agentic-ai"
  to = "/roadmap/agent-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/agentic-ai/*"
  to = "/roadmap/agent-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/production-ai"
  to = "/roadmap/production-agents"
  status = 301

[[redirects]]
  from = "/roadmap/production-ai/*"
  to = "/roadmap/production-agents/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/interview-projects"
  to = "/roadmap/capstone-projects"
  status = 301

[[redirects]]
  from = "/roadmap/interview-projects/*"
  to = "/roadmap/capstone-projects/:splat"
  status = 301

# Old v2-only slugs that were merged/renamed
[[redirects]]
  from = "/roadmap/genai-foundations/llm-basics"
  to = "/roadmap/genai-foundations/llms"
  status = 301

[[redirects]]
  from = "/roadmap/genai-foundations/rag-basics"
  to = "/roadmap/rag-engineering/rag"
  status = 301

[[redirects]]
  from = "/roadmap/genai-foundations/google-gemini"
  to = "/roadmap/llm-engineering/gemini"
  status = 301

[[redirects]]
  from = "/roadmap/genai-foundations/langchain-basics"
  to = "/roadmap/rag-engineering/langchain-basics"
  status = 301

[[redirects]]
  from = "/roadmap/genai-foundations/chromadb"
  to = "/roadmap/rag-engineering/chromadb"
  status = 301

[[redirects]]
  from = "/roadmap/genai-foundations/streamlit"
  to = "/roadmap/rag-engineering/streamlit"
  status = 301

[[redirects]]
  from = "/roadmap/genai-foundations/basic-tool-calling"
