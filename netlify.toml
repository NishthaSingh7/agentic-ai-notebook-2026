[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# v1 → v2 phase slug redirects
[[redirects]]
  from = "/roadmap/programming-foundations"
  to = "/roadmap/genai-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/programming-foundations/*"
  to = "/roadmap/genai-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/ai-engineering-foundations"
  to = "/roadmap/agent-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/ai-engineering-foundations/*"
  to = "/roadmap/agent-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/llm-engineering"
  to = "/roadmap/genai-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/llm-engineering/*"
  to = "/roadmap/genai-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/rag-engineering"
  to = "/roadmap/genai-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/rag-engineering/*"
  to = "/roadmap/genai-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/agentic-ai"
  to = "/roadmap/agent-foundations"
  status = 301

[[redirects]]
  from = "/roadmap/agentic-ai/*"
  to = "/roadmap/agent-foundations/:splat"
  status = 301

[[redirects]]
  from = "/roadmap/production-ai"
  to = "/roadmap/production-agents"
  status = 301

[[redirects]]
  from = "/roadmap/production-ai/*"
  to = "/roadmap/production-agents/:splat"
