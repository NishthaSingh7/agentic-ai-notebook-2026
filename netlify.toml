[[redirects]]
  from = "/roadmap/advanced-ai"
  to = "/roadmap/multimodal-agents"
  status = 301

[[redirects]]
  from = "/roadmap/advanced-ai/*"
  to = "/roadmap/multimodal-agents/:splat"
